[options]
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; Logging
log_level = info
logfile = False

; Workers (0 = use threaded server, suitable for single-instance dev)
workers = 0

; Security — set a strong key in production
admin_passwd = admin

; Limits
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120
